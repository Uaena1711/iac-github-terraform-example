# Per-env consumer: one job per environment calling the catalog's tf-env reusable workflow.
# dev = auto (its Environment has no reviewers); prod = approval (its Environment has a reviewer).
# apply runs only when that env's plan has changes, so an unchanged env never waits.
#
# Each env's tf-ci.env picks its own secret provider via SECRETS_PROVIDER= (github|awssm|none)
# and uses ${REF} placeholders; the workflow_dispatch `secrets_provider` input can override it.
# `secrets: inherit` lets the reusable workflow forward vars/secrets to the github provider.
#
name: terraform

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: deploy or destroy
        type: choice
        options: [deploy, destroy]
        default: deploy
      secrets_provider:
        description: override each env's file-level SECRETS_PROVIDER (blank = use the file's)
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

jobs:
  dev:
    uses: Uaena1711/iac-github/.github/workflows/tf-env.yml@v2
    secrets: inherit
    with:
      dir: envs/dev
      environment: dev
      default_region: us-east-1
      mode: ${{ inputs.mode || 'deploy' }}
      secrets_provider: ${{ inputs.secrets_provider || '' }}

  prod:
    uses: Uaena1711/iac-github/.github/workflows/tf-env.yml@v2
    secrets: inherit
    with:
      dir: envs/prod
      environment: prod
      default_region: us-east-1
      mode: ${{ inputs.mode || 'deploy' }}
      secrets_provider: ${{ inputs.secrets_provider || '' }}
