# Per-env consumer: one job per environment calling the catalog's tf-env reusable workflow.
# dev = auto (its Environment has no reviewers); prod = approval (its Environment has a reviewer).
# apply runs only when that env's plan has changes, so an unchanged prod never waits.
# NOTE: pinned to a branch ref for a pre-merge live test; switch to @v1 after release.
name: terraform

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: deploy or destroy
        type: choice
        options: [deploy, destroy]
        default: deploy

permissions:
  id-token: write
  contents: read

jobs:
  dev:
    uses: Uaena1711/iac-github/.github/workflows/tf-env.yml@feat/per-env-path-b
    with:
      dir: envs/dev
      environment: dev
      default_region: us-east-1
      mode: ${{ inputs.mode || 'deploy' }}

  prod:
    uses: Uaena1711/iac-github/.github/workflows/tf-env.yml@feat/per-env-path-b
    with:
      dir: envs/prod
      environment: prod
      default_region: us-east-1
      mode: ${{ inputs.mode || 'deploy' }}
