# Per-env consumer: one job per environment calling the catalog's tf-env reusable workflow.
# dev = auto (its Environment has no reviewers); prod = approval (its Environment has a reviewer).
# apply runs only when that env's plan has changes, so an unchanged env never waits.
#
# The catalog ships sensible per-job container images by default; you override only when needed.
# dev (github provider) runs on the defaults (jq auto-installs in the terraform image).
# prod (awssm provider) needs the aws CLI for its Secrets Manager lookups, so its plan/apply
# jobs are overridden to "" (the host, which has aws).
#
# NOTE: pinned to a branch ref for a pre-merge live test; switch to @v2 after release.
name: terraform

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: deploy or destroy
        type: choice
        options: [deploy, destroy]
        default: deploy
      secrets_provider:
        description: override each env's file-level SECRETS_PROVIDER (blank = use the file's)
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

jobs:
  dev:
    uses: Uaena1711/iac-github/.github/workflows/tf-env.yml@feat/container-image
    secrets: inherit
    with:
      dir: envs/dev
      environment: dev
      default_region: us-east-1
      mode: ${{ inputs.mode || 'deploy' }}
      secrets_provider: ${{ inputs.secrets_provider || '' }}

  prod:
    uses: Uaena1711/iac-github/.github/workflows/tf-env.yml@feat/container-image
    secrets: inherit
    with:
      dir: envs/prod
      environment: prod
      default_region: us-east-1
      mode: ${{ inputs.mode || 'deploy' }}
      secrets_provider: ${{ inputs.secrets_provider || '' }}
      plan_image: ""    # awssm needs the aws CLI -> run these on the host
      apply_image: ""
