# Per-env consumer: one job per environment calling the catalog's tf-env reusable workflow.
# dev = auto (its Environment has no reviewers); prod = approval (its Environment has a reviewer).
# apply runs only when that env's plan has changes, so an unchanged env never waits.
#
# Every job runs in a container by default (the catalog ships per-job images); both envs use
# the github provider, so jq auto-installs in the terraform image — nothing runs on the host.
name: terraform

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: deploy or destroy
        type: choice
        options: [deploy, destroy]
        default: deploy
      secrets_provider:
        description: override each env's file-level SECRETS_PROVIDER (blank = use the file's)
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

jobs:
  dev:
    uses: Uaena1711/iac-github/.github/workflows/tf-env.yml@v2
    secrets: inherit
    with:
      dir: envs/dev
      environment: dev
      default_region: us-east-1
      mode: ${{ inputs.mode || 'deploy' }}
      secrets_provider: ${{ inputs.secrets_provider || '' }}

  prod:
    uses: Uaena1711/iac-github/.github/workflows/tf-env.yml@v2
    secrets: inherit
    with:
      dir: envs/prod
      environment: prod
      default_region: us-east-1
      mode: ${{ inputs.mode || 'deploy' }}
      secrets_provider: ${{ inputs.secrets_provider || '' }}
