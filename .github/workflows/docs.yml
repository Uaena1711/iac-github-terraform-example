# On merge to main, regenerate terraform-docs for every module/stack and commit the READMEs
# back — so the repo is always easy to read. Uses the catalog's reusable tf-docs workflow.
# The doc commit carries [skip ci] and is made with GITHUB_TOKEN, so it never re-triggers a
# pipeline (no terraform apply, no docs loop).
#
name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  terraform-docs:
    uses: Uaena1711/iac-github/.github/workflows/tf-docs.yml@v2
    permissions:
      contents: write
    with:
      working_dir: .
