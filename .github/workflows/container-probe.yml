# TEMP probe #2: can the plan-job flow run inside hashicorp/terraform:1.15.7 (Alpine)?
# Tests OIDC (configure-aws-credentials) + what tools the image has (bash/jq/aws/git).
name: container-probe
on: { workflow_dispatch: {} }
permissions: { id-token: write, contents: read }
jobs:
  plan-in-terraform-image:
    runs-on: ubuntu-latest
    container: hashicorp/terraform:1.15.7
    continue-on-error: true
    steps:
      - name: tool inventory
        run: |
          echo "os: $(cat /etc/os-release | grep ^ID=)"
          for t in git bash sh jq aws curl unzip tar node; do
            if command -v "$t" >/dev/null 2>&1; then echo "HAVE $t"; else echo "MISS $t"; fi
          done
      - uses: actions/checkout@v5
      - name: OIDC federate (aws-oidc equivalent)
        id: creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::377521353143:role/iac-github-oidc-test
          aws-region: us-east-1
      - name: did we get creds?
        run: |
          if [ -n "${AWS_ACCESS_KEY_ID:-}" ]; then echo "OIDC OK: creds present"; else echo "OIDC FAILED: no creds"; fi
      - name: terraform
        run: terraform version
