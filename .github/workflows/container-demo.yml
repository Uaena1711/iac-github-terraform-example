# Manual demo: EACH JOB runs in its OWN image (different containers per job).
#   secret_scan -> a gitleaks image   |   lint/plan/apply -> a terraform image   |   resolve -> host
name: container-demo
on: { workflow_dispatch: {} }
permissions:
  id-token: write
  contents: read
jobs:
  demo:
    uses: Uaena1711/iac-github/.github/workflows/tf-env.yml@feat/container-image
    with:
      dir: envs/container-demo
      environment: dev
      default_region: us-east-1
      secret_scan_image: zricethezav/gitleaks:latest   # gitleaks baked in (reused, not installed)
      lint_image: hashicorp/terraform:1.15.7           # terraform for fmt; tflint auto-installs
      plan_image: hashicorp/terraform:1.15.7           # pure terraform
      apply_image: hashicorp/terraform:1.15.7
      # resolve_image omitted -> runs on the host
